services:
  - type: web
    name: pawid
    runtime: node
    plan: starter
    buildCommand: npm install --include=dev && npm run build && npm install --prefix server --omit=dev
    startCommand: node server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://www.pawid.lat
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
    disk:
      name: pawid-db
      mountPath: /var/data
      sizeGB: 1
